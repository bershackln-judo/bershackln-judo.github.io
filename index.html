<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Magyarázó</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4A7C59" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #4A7C59;
      --graphite: #1F2E1F;
      --bg: #F2F5F0;
      --nav-height: 64px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--graphite);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Screens ── */
    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }

    .screen.active {
      display: flex;
      animation: screenIn 0.2s ease both;
    }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .screen-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--graphite);
      letter-spacing: -0.5px;
    }

    .screen-subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    /* ── Verbs screen ── */
    #screen-verbs {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .verbs-header {
      padding: 20px 16px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .verbs-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--graphite);
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd6ca;
      border-radius: 12px;
      background: #fff;
      font-size: 15px;
      color: var(--graphite);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: var(--orange);
    }

    .search-input::placeholder {
      color: #bbb;
    }

    .verbs-list {
      padding: 4px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .verb-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .verb-card:active {
      transform: scale(0.98);
      border-color: var(--orange);
    }

    .verb-card-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .verb-hu {
      font-size: 18px;
      font-weight: 700;
      color: var(--graphite);
    }

    .verb-ru {
      font-size: 13px;
      color: #888;
    }

    .verb-arrow {
      color: #ccc;
      font-size: 18px;
      flex-shrink: 0;
    }

    .no-results {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 32px 0;
    }

    /* ── Home screen ── */
    #screen-home {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .home-body {
      flex: 1;
      overflow-y: auto;
      padding: 52px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .home-title-block { text-align: center; }

    .home-app-name {
      font-size: 40px;
      font-weight: 900;
      color: var(--orange);
      letter-spacing: -1.5px;
    }

    .home-tagline {
      font-size: 14px;
      color: #999;
      margin-top: 6px;
    }

    .home-wod {
      background: #fff;
      border-radius: 20px;
      padding: 22px 20px 18px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .home-wod-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
    }

    .home-wod-hu {
      font-size: 38px;
      font-weight: 800;
      color: var(--graphite);
      letter-spacing: -1px;
    }

    .home-wod-transcription {
      font-size: 13px;
      color: #aaa;
      font-style: italic;
    }

    .home-wod-ru {
      font-size: 17px;
      color: #777;
      margin-top: 2px;
    }

    .home-wod-listen {
      margin-top: 14px;
      padding: 10px 24px;
      border-radius: 50px;
      border: none;
      background: var(--orange);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.15s;
    }

    .home-wod-listen:active { opacity: 0.8; }
    .home-wod-listen svg { width: 14px; height: 14px; fill: #fff; }

    .home-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .home-card {
      background: #fff;
      border-radius: 18px;
      border: none;
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, box-shadow 0.12s;
      text-align: left;
      width: 100%;
    }

    .home-card:active {
      transform: scale(0.96);
      box-shadow: 0 3px 14px rgba(74,124,89,0.18);
    }

    .home-card-icon { font-size: 26px; margin-bottom: 6px; }

    .home-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--graphite);
    }

    .home-card-sub { font-size: 11px; color: #aaa; }

    .home-dict-info {
      text-align: center;
      font-size: 13px;
      color: #bbb;
      padding-bottom: 4px;
    }

    /* ── Nouns screen ── */
    #screen-nouns {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .nouns-header {
      padding: 20px 16px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nouns-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--graphite);
      margin-bottom: 12px;
    }

    .nouns-list {
      padding: 4px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Assistant screen ── */
    #screen-assistant {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .asst-header {
      padding: 20px 16px 0;
      flex-shrink: 0;
    }

    .asst-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--graphite);
    }

    .asst-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .asst-mic-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .asst-mic-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: none;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(74,124,89,0.38);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, transform 0.1s;
      position: relative;
    }

    .asst-mic-btn:active { transform: scale(0.94); }

    .asst-mic-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2.5px solid var(--orange);
      opacity: 0;
      animation: asst-pulse 2.2s ease-out infinite;
    }

    @keyframes asst-pulse {
      0%   { opacity: 0.55; transform: scale(1); }
      100% { opacity: 0;    transform: scale(1.45); }
    }

    .asst-mic-btn.recording {
      background: #c83232;
      box-shadow: 0 6px 24px rgba(200,50,50,0.38);
    }

    .asst-mic-btn.recording::before {
      border-color: #c83232;
      animation: asst-pulse-fast 0.75s ease-out infinite;
    }

    @keyframes asst-pulse-fast {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.55); }
    }

    .asst-mic-btn svg {
      width: 38px;
      height: 38px;
      fill: #fff;
      flex-shrink: 0;
    }

    .asst-mic-status {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      min-height: 18px;
    }

    .asst-mic-status.active { color: #c83232; font-weight: 600; }

    .asst-buttons-row {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      justify-content: center;
    }

    .asst-cam-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .asst-cam-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, box-shadow 0.15s;
      position: relative;
    }

    .asst-cam-btn:active {
      transform: scale(0.94);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .asst-cam-btn svg {
      width: 30px;
      height: 30px;
      stroke: var(--orange);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .asst-cam-label {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      min-height: 18px;
    }

    .asst-img-preview {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #f0ece4;
    }

    .asst-img-preview img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .asst-ocr-bar {
      padding: 10px 14px;
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8f6f2;
    }

    .asst-ocr-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #e0dbd2;
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: asst-spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    .asst-input-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .asst-input {
      flex: 1;
      padding: 12px 14px;
      border: 1.5px solid #ddd6ca;
      border-radius: 14px;
      background: #fff;
      font-size: 15px;
      color: var(--graphite);
      outline: none;
      transition: border-color 0.15s;
    }

    .asst-input:focus { border-color: var(--orange); }
    .asst-input::placeholder { color: #bbb; }

    .asst-send-btn {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      border: none;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .asst-send-btn:active { opacity: 0.75; }
    .asst-send-btn svg { width: 22px; height: 22px; fill: #fff; }

    .asst-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .asst-spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #e0dbd2;
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: asst-spin 0.75s linear infinite;
    }

    @keyframes asst-spin { to { transform: rotate(360deg); } }
    .asst-loading p { font-size: 13px; color: #aaa; }

    .asst-result {
      width: 100%;
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.08);
    }

    .asst-result-word {
      font-size: 30px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 18px;
    }

    .asst-result-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .asst-result-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--orange);
      min-width: 90px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .asst-result-value {
      font-size: 14px;
      color: var(--graphite);
      line-height: 1.55;
    }

    .asst-result-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    .asst-result-btn {
      flex: 1;
      padding: 11px 8px;
      border-radius: 12px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .asst-result-btn:active { opacity: 0.75; }
    .asst-result-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .asst-listen-result-btn {
      background: rgba(74,124,89,0.1);
      color: var(--orange);
    }

    .asst-listen-result-btn svg { fill: var(--orange); }

    .asst-save-result-btn { background: var(--orange); color: #fff; }

    .asst-save-result-btn svg {
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .asst-save-result-btn.saved { background: #7a9e8a; }

    .asst-settings {
      flex-shrink: 0;
      border-top: 1px solid #e0dbd2;
      background: var(--bg);
    }

    .asst-settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .asst-settings-toggle span:first-child {
      font-size: 13px;
      font-weight: 600;
      color: #999;
    }

    .asst-settings-arrow {
      font-size: 18px;
      color: #bbb;
      transition: transform 0.2s;
      display: inline-block;
    }

    .asst-settings-arrow.open { transform: rotate(90deg); }

    .asst-settings-body {
      display: none;
      padding: 0 16px 16px;
    }

    .asst-settings-body.open { display: block; }

    .asst-settings-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
    }

    .asst-api-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd6ca;
      border-radius: 12px;
      background: #fff;
      font-size: 13px;
      font-family: monospace;
      letter-spacing: 0.5px;
      color: var(--graphite);
      outline: none;
      transition: border-color 0.15s;
    }

    .asst-api-input:focus { border-color: var(--orange); }

    .asst-settings-hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
      line-height: 1.6;
    }

    .asst-settings-hint a { color: var(--orange); text-decoration: none; }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #ddd6ca;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .filter-tab.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 88dvh;
      overflow-y: auto;
      padding: 0 20px 32px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: #e0dbd2;
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .modal-word {
      font-size: 40px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -1px;
      text-align: center;
    }

    .modal-transcription {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      margin-top: 4px;
      font-style: italic;
    }

    .modal-translation {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--graphite);
      margin-top: 8px;
    }

    .modal-listen-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 20px auto 0;
      padding: 12px 28px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .modal-listen-btn:active {
      opacity: 0.8;
    }

    .modal-listen-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    .modal-divider {
      height: 1px;
      background: #f0ece4;
      margin: 24px 0;
    }

    .modal-examples-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 14px;
    }

    .example-item {
      margin-bottom: 14px;
    }

    .example-hu {
      font-size: 15px;
      font-weight: 600;
      color: var(--graphite);
    }

    .example-ru {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .modal-save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: transparent;
      border: 2px solid var(--orange);
      border-radius: 14px;
      color: var(--orange);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .modal-save-btn.saved {
      background: var(--orange);
      color: #fff;
    }

    .modal-save-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── Dictionary screen ── */
    #screen-dictionary {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .dict-header {
      padding: 20px 16px 14px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .dict-title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .dict-title-row h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--graphite);
    }

    .dict-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--orange);
    }

    .dict-list {
      flex: 1;
      padding: 4px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .dict-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 64px 32px;
      text-align: center;
    }

    .dict-empty-icon {
      font-size: 52px;
      line-height: 1;
      opacity: 0.25;
    }

    .dict-empty p {
      color: #aaa;
      font-size: 15px;
      line-height: 1.6;
      max-width: 240px;
    }

    .dict-item {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .dict-item-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dict-item-hu {
      font-size: 17px;
      font-weight: 700;
      color: var(--graphite);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dict-item-ru {
      font-size: 13px;
      color: #888;
    }

    .dict-item-date {
      font-size: 11px;
      color: #bbb;
      margin-top: 1px;
    }

    .dict-item-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .dict-action-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .dict-action-btn:active {
      opacity: 0.7;
      transform: scale(0.92);
    }

    .dict-listen-btn {
      background: rgba(74,124,89,0.12);
    }

    .dict-listen-btn svg {
      width: 17px;
      height: 17px;
      fill: var(--orange);
      stroke: none;
    }

    .dict-delete-btn {
      background: rgba(200,50,50,0.08);
    }

    .dict-delete-btn svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: #c83232;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dict-add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 50px;
      border: none;
      background: var(--orange);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .dict-add-btn:active { opacity: 0.8; }

    .dict-add-btn svg {
      width: 14px;
      height: 14px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      flex-shrink: 0;
    }

    /* Add-word form overlay */
    .dict-form-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .dict-form-overlay.open { display: flex; }

    .dict-form-sheet {
      background: #fff;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      padding: 28px 24px 28px;
      transform: scale(0.94);
      opacity: 0;
      transition: transform 0.22s cubic-bezier(0.32,0.72,0,1), opacity 0.22s ease;
    }

    .dict-form-overlay.open .dict-form-sheet {
      transform: scale(1);
      opacity: 1;
    }

    .dict-form-handle { display: none; }

    .dict-form-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--graphite);
      margin-bottom: 20px;
    }

    .dict-form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
    }

    .dict-form-input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #ddd6ca;
      border-radius: 14px;
      background: var(--bg);
      font-size: 16px;
      color: var(--graphite);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    .dict-form-input:focus { border-color: var(--orange); }
    .dict-form-input::placeholder { color: #ccc; }

    .dict-form-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .dict-form-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid #ddd6ca;
      background: transparent;
      color: #aaa;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .dict-form-cancel:active { background: #f0ece4; }

    .dict-form-save {
      flex: 2;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--orange);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .dict-form-save:active { opacity: 0.8; }

    .dict-form-save:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* Direction toggle */
    .dict-dir-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .dict-dir-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 12px;
      border: 1.5px solid #ddd6ca;
      background: transparent;
      color: #aaa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      text-align: center;
      line-height: 1.4;
    }

    .dict-dir-btn.active {
      border-color: var(--orange);
      background: rgba(74,124,89,0.09);
      color: var(--orange);
    }

    .dict-dir-flag {
      font-size: 16px;
      display: block;
      margin-bottom: 2px;
    }

    .dict-dir-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(74,124,89,0.1);
      color: var(--orange);
      margin-top: 3px;
    }

    .dict-item-manual-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(74,124,89,0.1);
      border-radius: 4px;
      padding: 2px 5px;
      margin-top: 3px;
      align-self: flex-start;
    }

    .dict-footer {
      padding: 10px 16px 16px;
      background: var(--bg);
      border-top: 1px solid #e0dbd2;
      flex-shrink: 0;
    }

    .dict-clear-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1.5px solid #c83232;
      border-radius: 14px;
      color: #c83232;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .dict-clear-btn:active {
      background: #c83232;
      color: #fff;
    }

    /* ── Bottom nav ── */
    nav {
      height: var(--nav-height);
      background: #fff;
      border-top: 1px solid #e0dbd2;
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      color: #aaa;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn.active {
      color: var(--orange);
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- ── Screens ── -->
  <main>
    <section class="screen active" id="screen-home">
      <div class="home-body">

        <div class="home-title-block">
          <h1 class="home-app-name">Magyarázó</h1>
          <p class="home-tagline">Венгерский для жизни в Венгрии</p>
        </div>

        <div class="home-wod">
          <div class="home-wod-label">Слово дня</div>
          <div class="home-wod-hu" id="wod-hu">—</div>
          <div class="home-wod-transcription" id="wod-transcription"></div>
          <div class="home-wod-ru" id="wod-ru"></div>
          <button class="home-wod-listen" id="wod-listen-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <line x1="12" y1="19" x2="12" y2="23" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <line x1="8"  y1="23" x2="16" y2="23" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
            ПОСЛУШАТЬ
          </button>
        </div>

        <div class="home-cards">
          <button class="home-card" data-target="screen-verbs">
            <span class="home-card-icon">⚡</span>
            <span class="home-card-title">Глаголы</span>
            <span class="home-card-sub">100 слов</span>
          </button>
          <button class="home-card" data-target="screen-nouns">
            <span class="home-card-icon">📦</span>
            <span class="home-card-title">Существительные</span>
            <span class="home-card-sub" id="home-nouns-count">— слов</span>
          </button>
          <button class="home-card" data-target="screen-assistant">
            <span class="home-card-icon">🎙️</span>
            <span class="home-card-title">Помощник</span>
            <span class="home-card-sub">спроси что угодно</span>
          </button>
          <button class="home-card" data-target="screen-dictionary">
            <span class="home-card-icon">📚</span>
            <span class="home-card-title">Словарь</span>
            <span class="home-card-sub" id="home-dict-sub">сохранённые слова</span>
          </button>
        </div>

        <p class="home-dict-info" id="home-dict-info"></p>

      </div>
    </section>

    <section class="screen" id="screen-verbs">
      <div class="verbs-header">
        <h1>Глаголы · Igék</h1>
        <input
          class="search-input"
          type="search"
          placeholder="Поиск глагола..."
          id="verb-search"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
      <div class="verbs-list" id="verbs-list"></div>
    </section>

    <section class="screen" id="screen-nouns">
      <div class="nouns-header">
        <h1>Существительные · Főnevek</h1>
        <div class="filter-tabs" id="noun-filter-tabs">
          <button class="filter-tab active" data-topic="all">Все</button>
          <button class="filter-tab" data-topic="people">Люди</button>
          <button class="filter-tab" data-topic="body">Тело и здоровье</button>
          <button class="filter-tab" data-topic="food">Еда и напитки</button>
          <button class="filter-tab" data-topic="home">Дом и быт</button>
          <button class="filter-tab" data-topic="city">Город и транспорт</button>
          <button class="filter-tab" data-topic="work">Работа и инструменты</button>
          <button class="filter-tab" data-topic="time">Время</button>
          <button class="filter-tab" data-topic="nature">Природа</button>
          <button class="filter-tab" data-topic="shop">Магазин</button>
          <button class="filter-tab" data-topic="docs">Документы</button>
          <button class="filter-tab" data-topic="emotions">Эмоции</button>
        </div>
      </div>
      <div class="nouns-list" id="nouns-list"></div>
    </section>

    <section class="screen" id="screen-assistant">
      <div class="asst-header">
        <h1>Помощник · Asszisztens</h1>
      </div>

      <div class="asst-body">
        <!-- Mic + Camera row -->
        <div class="asst-buttons-row">
          <div class="asst-mic-wrap">
            <button class="asst-mic-btn" id="asst-mic-btn" aria-label="Запись голоса">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="23" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
                <line x1="8"  y1="23" x2="16" y2="23" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>
            <p class="asst-mic-status" id="asst-mic-status">Нажмите чтобы говорить</p>
          </div>

          <div class="asst-cam-wrap">
            <button class="asst-cam-btn" id="asst-cam-btn" aria-label="Сфотографировать">
              <svg viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </button>
            <p class="asst-cam-label">Сфотографировать</p>
          </div>
        </div>

        <!-- Hidden camera input -->
        <input type="file" id="asst-cam-input" accept="image/*" capture="environment" style="display:none" />

        <!-- Image preview + OCR status -->
        <div class="asst-img-preview" id="asst-img-preview" style="display:none">
          <img id="asst-preview-img" alt="Фото" />
          <div class="asst-ocr-bar" id="asst-ocr-bar">
            <div class="asst-ocr-spinner"></div>
            <span id="asst-ocr-text">Читаю текст...</span>
          </div>
        </div>

        <!-- Text input -->
        <div class="asst-input-row">
          <input
            class="asst-input" id="asst-input"
            type="text"
            placeholder="Введите венгерское слово или фразу..."
            autocomplete="off" autocorrect="off" spellcheck="false"
          />
          <button class="asst-send-btn" id="asst-send-btn" aria-label="Отправить">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>

        <!-- Loading -->
        <div class="asst-loading" id="asst-loading" style="display:none">
          <div class="asst-spinner"></div>
          <p>Запрашиваю ответ...</p>
        </div>

        <!-- Result card -->
        <div class="asst-result" id="asst-result" style="display:none">
          <div class="asst-result-word" id="asst-result-word"></div>
          <div id="asst-result-content"></div>
          <div class="asst-result-actions" id="asst-result-actions">
            <button class="asst-result-btn asst-listen-result-btn" id="asst-listen-result-btn">
              <svg viewBox="0 0 24 24">
                <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="23" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"/>
                <line x1="8"  y1="23" x2="16" y2="23" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>ПОСЛУШАТЬ</span>
            </button>
            <button class="asst-result-btn asst-save-result-btn" id="asst-save-result-btn">
              <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
              <span id="asst-save-label">СОХРАНИТЬ</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="asst-settings">
        <div class="asst-settings-toggle" id="asst-settings-toggle">
          <span>Настройки API</span>
          <span class="asst-settings-arrow" id="asst-settings-arrow">›</span>
        </div>
        <div class="asst-settings-body" id="asst-settings-body">
          <label class="asst-settings-label" for="asst-api-input">Gemini API ключ</label>
          <input
            class="asst-api-input" id="asst-api-input"
            type="password"
            placeholder="AIza..."
            autocomplete="off"
          />
          <p class="asst-settings-hint">
            Бесплатный ключ на
            <a href="https://aistudio.google.com" target="_blank" rel="noopener noreferrer">aistudio.google.com</a>
          </p>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-dictionary">
      <div class="dict-header">
        <div class="dict-title-row">
          <h1>Словарь · Szótár</h1>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="dict-count" id="dict-count"></span>
            <button class="dict-add-btn" id="dict-add-btn">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              ДОБАВИТЬ
            </button>
          </div>
        </div>
      </div>
      <div class="dict-list" id="dict-list"></div>
      <div class="dict-footer" id="dict-footer">
        <button class="dict-clear-btn" id="dict-clear-btn">ОЧИСТИТЬ ВСЁ</button>
      </div>
    </section>

    <!-- ── Add-word form overlay ── -->
    <div class="dict-form-overlay" id="dict-form-overlay">
      <div class="dict-form-sheet">
        <div class="dict-form-handle"></div>
        <div class="dict-form-title">Добавить слово</div>

        <!-- Direction toggle -->
        <div class="dict-dir-toggle">
          <button class="dict-dir-btn active" id="dict-dir-hu2ru">
            <span class="dict-dir-flag">🇭🇺 → 🇷🇺</span>
            Венгерский → Русский
          </button>
          <button class="dict-dir-btn" id="dict-dir-ru2hu">
            <span class="dict-dir-flag">🇷🇺 → 🇭🇺</span>
            Русский → Венгерский
          </button>
        </div>

        <label class="dict-form-label" id="dict-form-label1" for="dict-form-field1">Венгерское слово</label>
        <input
          class="dict-form-input" id="dict-form-field1"
          type="text"
          placeholder="например: köszönöm"
          autocomplete="off" autocorrect="off" spellcheck="false"
        />
        <label class="dict-form-label" id="dict-form-label2" for="dict-form-field2">Перевод на русский</label>
        <input
          class="dict-form-input" id="dict-form-field2"
          type="text"
          placeholder="например: спасибо"
          autocomplete="off" spellcheck="false"
        />
        <div class="dict-form-actions">
          <button class="dict-form-cancel" id="dict-form-cancel">ОТМЕНА</button>
          <button class="dict-form-save" id="dict-form-save" disabled>СОХРАНИТЬ</button>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Modal ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-word" id="modal-word"></div>
      <div class="modal-transcription" id="modal-transcription"></div>
      <div class="modal-translation" id="modal-translation"></div>

      <button class="modal-listen-btn" id="modal-listen-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="19" x2="12" y2="23" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <line x1="8" y1="23" x2="16" y2="23" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
        ПОСЛУШАТЬ
      </button>

      <div class="modal-divider"></div>

      <div class="modal-examples-title">Примеры</div>
      <div id="modal-examples"></div>

      <button class="modal-save-btn" id="modal-save-btn">
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        <span id="modal-save-label">СОХРАНИТЬ В СЛОВАРЬ</span>
      </button>
    </div>
  </div>

  <!-- ── Bottom Navigation ── -->
  <nav>
    <button class="nav-btn active" data-target="screen-home" aria-label="Главная">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span class="nav-label">Главная</span>
    </button>

    <button class="nav-btn" data-target="screen-verbs" aria-label="Глаголы">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h7"/><path d="M18 14l3 3-3 3"/></svg>

    /* ── Render verb list ── */
    const verbsList = document.getElementById('verbs-list');

    function renderVerbs(list) {
      verbsList.innerHTML = '';
      if (list.length === 0) {
        verbsList.innerHTML = '<p class="no-results">Ничего не найдено</p>';
        return;
      }
      list.forEach((verb, idx) => {
        const card = document.createElement('div');
        card.className = 'verb-card';
        card.dataset.idx = idx;
        card.innerHTML = `
          <div class="verb-card-left">
            <span class="verb-hu">${verb.hu}</span>
            <span class="verb-ru">${verb.ru}</span>
          </div>
          <span class="verb-arrow">›</span>
        `;
        card.addEventListener('click', () => openModal(verb));
        verbsList.appendChild(card);
      });
    }

    renderVerbs(verbs);

    /* ── Search ── */
    document.getElementById('verb-search').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = q
        ? verbs.filter(v => v.hu.toLowerCase().includes(q) || v.ru.toLowerCase().includes(q))
        : verbs;
      renderVerbs(filtered);
    });

      { topic:'emotions', hu:'bizalom',     ru:'доверие',         transcription:'[бизолом]',   examples:[{hu:'Nagy bizalom.',ru:'Большое доверие.'},{hu:'Bízom benned.',ru:'Я доверяю тебе.'},{hu:'A bizalom fontos.',ru:'Доверие важно.'}] },
      { topic:'emotions', hu:'megértés',    ru:'понимание',       transcription:'[мэгэртэш]',  examples:[{hu:'Köszönöm a megértést.',ru:'Спасибо за понимание.'},{hu:'Megértéssel fogadom.',ru:'Я принимаю с пониманием.'},{hu:'A megértés fontos.',ru:'Понимание важно.'}] },
    ];

    /* ── Render nouns ── */
    const nounsList = document.getElementById('nouns-list');
    let activeNounTopic = 'all';

    function renderNouns() {
      const list = activeNounTopic === 'all'
        ? nouns
        : nouns.filter(n => n.topic === activeNounTopic);
      nounsList.innerHTML = '';
      if (!list.length) {
        nounsList.innerHTML = '<p class="no-results">Ничего не найдено</p>';
        return;
      }
      list.forEach(noun => {
        const card = document.createElement('div');
        card.className = 'verb-card';
        card.innerHTML = `
          <div class="verb-card-left">
            <span class="verb-hu">${noun.hu}</span>
            <span class="verb-ru">${noun.ru}</span>
          </div>
          <span class="verb-arrow">›</span>
        `;
        card.addEventListener('click', () => openModal(noun));
        nounsList.appendChild(card);
      });
    }

    renderNouns();

    document.getElementById('noun-filter-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      activeNounTopic = tab.dataset.topic;
      document.querySelectorAll('#noun-filter-tabs .filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderNouns();
    });

    /* ── Modal ── */
    const overlay   = document.getElementById('modal-overlay');
    const modal     = document.getElementById('modal');
    let currentVerb = null;

    function getSavedVerbs() {
      try { return JSON.parse(localStorage.getItem('savedVerbs') || '[]'); }
      catch { return []; }
    }

    function openModal(verb) {
      currentVerb = verb;

      document.getElementById('modal-word').textContent         = verb.hu;
      document.getElementById('modal-transcription').textContent = verb.transcription;
      document.getElementById('modal-translation').textContent  = verb.ru;

      const examplesEl = document.getElementById('modal-examples');
      examplesEl.innerHTML = verb.examples.map(ex => `
        <div class="example-item">
          <div class="example-hu">${ex.hu}</div>
          <div class="example-ru">${ex.ru}</div>
        </div>
      `).join('');

      updateSaveBtn(verb);
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      currentVerb = null;
    }

    function updateSaveBtn(verb) {
      const saved  = getSavedVerbs();
      const isSaved = saved.some(v => v.hu === verb.hu);
      const btn    = document.getElementById('modal-save-btn');
      const label  = document.getElementById('modal-save-label');
      btn.classList.toggle('saved', isSaved);
      label.textContent = isSaved ? 'В СЛОВАРЕ ✓' : 'СОХРАНИТЬ В СЛОВАРЬ';
    }

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });

    /* ── Listen (Web Speech API) ── */
    document.getElementById('modal-listen-btn').addEventListener('click', () => {
      if (!currentVerb || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(currentVerb.hu);
      utt.lang = 'hu-HU';
      utt.rate = 0.85;
      window.speechSynthesis.speak(utt);
    });

    /* ── Save to dictionary ── */
    document.getElementById('modal-save-btn').addEventListener('click', () => {
      if (!currentVerb) return;
      const saved   = getSavedVerbs();
      const idx     = saved.findIndex(v => v.hu === currentVerb.hu);
      if (idx === -1) {
        saved.push({ ...currentVerb, savedAt: new Date().toISOString() });
      } else {
        saved.splice(idx, 1);
      }
      localStorage.setItem('savedVerbs', JSON.stringify(saved));
      updateSaveBtn(currentVerb);
      renderDictionary();
    });
    /* ── Assistant screen ── */
    (function () {
      const micBtn      = document.getElementById('asst-mic-btn');
      const micStatus   = document.getElementById('asst-mic-status');
      const inputEl     = document.getElementById('asst-input');
      const sendBtn     = document.getElementById('asst-send-btn');
      const loadingEl   = document.getElementById('asst-loading');
      const resultEl    = document.getElementById('asst-result');
      const resultWord  = document.getElementById('asst-result-word');
      const resultBody  = document.getElementById('asst-result-content');
      const resultActs  = document.getElementById('asst-result-actions');
      const listenBtn   = document.getElementById('asst-listen-result-btn');
      const saveBtn     = document.getElementById('asst-save-result-btn');
      const saveLbl     = document.getElementById('asst-save-label');
      const apiInput    = document.getElementById('asst-api-input');
      const settingsTgl = document.getElementById('asst-settings-toggle');
      const settingsBody= document.getElementById('asst-settings-body');
      const settingsArrow=document.getElementById('asst-settings-arrow');

      const GEMINI_KEY  = 'geminiApiKey';
      apiInput.value    = localStorage.getItem(GEMINI_KEY) || '';
      apiInput.addEventListener('change', () =>
        localStorage.setItem(GEMINI_KEY, apiInput.value.trim())
      );

      settingsTgl.addEventListener('click', () => {
        settingsBody.classList.toggle('open');
        settingsArrow.classList.toggle('open');
      });

      /* ── Mic ── */
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null, isRecording = false;
      let currentWord  = '';
      let lastResult   = null;

      if (SR) {
        recognition = new SR();
        recognition.lang            = 'hu-HU';
        recognition.continuous      = false;
        recognition.interimResults  = false;
        recognition.onresult = e => {
          const text = e.results[0][0].transcript.trim();
          inputEl.value = text;
          stopRec();
          query(text);
        };
        recognition.onerror = () => stopRec();
        recognition.onend   = () => stopRec();
      } else {
        micStatus.textContent = 'Микрофон недоступен в этом браузере';
      }

      function startRec() {
        if (!recognition) return;
        isRecording = true;
        micBtn.classList.add('recording');
        micStatus.textContent = 'Говорите по-венгерски…';
        micStatus.classList.add('active');
        try { recognition.start(); } catch (_) { stopRec(); }
      }

      function stopRec() {
        isRecording = false;
        micBtn.classList.remove('recording');
        micStatus.textContent = SR ? 'Нажмите чтобы говорить' : 'Микрофон недоступен';
        micStatus.classList.remove('active');
      }

      micBtn.addEventListener('click', () => {
        if (!recognition) { return; }
        isRecording ? recognition.stop() : startRec();
      });

      /* ── Send ── */
      sendBtn.addEventListener('click', () => {
        const t = inputEl.value.trim();
        if (t) query(t);
      });

      inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') { const t = inputEl.value.trim(); if (t) query(t); }
      });

      /* ── Gemini ── */
      async function query(text) {
        const key = apiInput.value.trim() || localStorage.getItem(GEMINI_KEY) || '';
        currentWord = text;
        resultEl.style.display = 'none';
        lastResult = null;

        if (!key) {
          showInfo(
            text,
            '<span style="color:#aaa">Введите Gemini API ключ в настройках ниже.<br>' +
            'Бесплатный ключ: <a href="https://aistudio.google.com" target="_blank" ' +
            'rel="noopener" style="color:var(--orange)">aistudio.google.com</a></span>',
            false
          );
          settingsBody.classList.add('open');
          settingsArrow.classList.add('open');
          return;
        }

        loadingEl.style.display = 'flex';

        const prompt =
          `Пользователь написал или произнёс венгерское слово или фразу: "${text}"\n` +
          `Ответь строго в этом формате (без лишних слов):\n` +
          `1. Перевод: [перевод на русский]\n` +
          `2. Транскрипция: [произношение русскими буквами]\n` +
          `3. Пример: [пример на венгерском] — [перевод примера]`;

        try {
          const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            }
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data  = await res.json();
          const raw   = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
          renderResult(text, raw);
        } catch (err) {
          showInfo(text,
            `<span style="color:#c83232">Ошибка: ${err.message}</span>`, false);
        } finally {
          loadingEl.style.display = 'none';
        }
      }

      function parseRaw(raw) {
        let translation = '', transcription = '', example = '';
        raw.split('\n').forEach(line => {
          const l = line.trim();
          const m1 = l.match(/^1\.\s*Перевод\s*:\s*(.+)/i);
          const m2 = l.match(/^2\.\s*Транскрипция\s*:\s*(.+)/i);
          const m3 = l.match(/^3\.\s*Пример\s*:\s*(.+)/i);
          if (m1) translation   = m1[1].trim();
          if (m2) transcription = m2[1].trim();
          if (m3) example       = m3[1].trim();
        });
        return { translation: translation || raw.trim(), transcription, example };
      }

      function renderResult(word, raw) {
        const { translation, transcription, example } = parseRaw(raw);
        lastResult = { word, translation, transcription, example };

        resultWord.textContent = word;
        resultBody.innerHTML   = '';

        [
          { label: 'Перевод',      value: translation },
          { label: 'Транскрипция', value: transcription },
          { label: 'Пример',       value: example },
        ].filter(r => r.value).forEach(({ label, value }) => {
          const row = document.createElement('div');
          row.className = 'asst-result-row';
          row.innerHTML =
            `<span class="asst-result-label">${label}</span>` +
            `<span class="asst-result-value">${value}</span>`;
          resultBody.appendChild(row);
        });

        saveLbl.textContent = 'СОХРАНИТЬ';
        saveBtn.classList.remove('saved');
        resultActs.style.display = 'flex';
        resultEl.style.display   = 'block';
        resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function showInfo(word, html, showActions) {
        resultWord.textContent     = word;
        resultBody.innerHTML       = `<div class="asst-result-row"><span class="asst-result-value">${html}</span></div>`;
        resultActs.style.display   = showActions ? 'flex' : 'none';
        resultEl.style.display     = 'block';
      }

      /* ── Listen ── */
      listenBtn.addEventListener('click', () => {
        if (!currentWord || !window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentWord);
        u.lang = 'hu-HU'; u.rate = 0.85;
        window.speechSynthesis.speak(u);
      });

      /* ── Save ── */
      saveBtn.addEventListener('click', () => {
        if (!lastResult) return;
        const saved = getSavedVerbs();
        const exists = saved.some(v => v.hu === lastResult.word);
        if (!exists) {
          const parts = lastResult.example.split('—');
          saved.push({
            hu: lastResult.word,
            ru: lastResult.translation,
            transcription: lastResult.transcription ? `[${lastResult.transcription}]` : '',
            examples: lastResult.example
              ? [{ hu: (parts[0] || lastResult.example).trim(),
                   ru: (parts[1] || '').trim() }]
              : [],
            savedAt: new Date().toISOString(),
          });
          localStorage.setItem('savedVerbs', JSON.stringify(saved));
          renderDictionary();
        }
        saveBtn.classList.add('saved');
        saveLbl.textContent = 'СОХРАНЕНО ✓';
      });

      /* ── Camera + OCR ── */
      const camBtn      = document.getElementById('asst-cam-btn');
      const camInput    = document.getElementById('asst-cam-input');
      const imgPreview  = document.getElementById('asst-img-preview');
      const previewImg  = document.getElementById('asst-preview-img');
      const ocrBar      = document.getElementById('asst-ocr-bar');
      const ocrText     = document.getElementById('asst-ocr-text');

      camBtn.addEventListener('click', () => camInput.click());

      camInput.addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        camInput.value = '';

        // Show preview
        const url = URL.createObjectURL(file);
        previewImg.src = url;
        imgPreview.style.display = 'block';
        ocrBar.style.display     = 'flex';
        ocrText.textContent      = 'Читаю текст...';

        // Scroll to preview
        imgPreview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // Reset result area
        resultEl.style.display  = 'none';
        loadingEl.style.display = 'none';

        try {
          if (typeof Tesseract === 'undefined') throw new Error('Tesseract не загружен');

          const result = await Tesseract.recognize(file, 'hun+rus+eng', {
            logger: m => {
              if (m.status === 'recognizing text') {
                ocrText.textContent = `Читаю текст... ${Math.round(m.progress * 100)}%`;
              }
            }
          });

          const text = result.data.text.trim();
          ocrBar.style.display = 'none';

          if (!text) {
            ocrText.textContent    = 'Текст не найден на фото';
            ocrBar.style.display   = 'flex';
            ocrBar.querySelector('.asst-ocr-spinner').style.display = 'none';
            return;
          }

          // Send to Gemini with camera prompt
          await queryCameraText(text);

        } catch (err) {
          ocrText.textContent  = `Ошибка: ${err.message}`;
          ocrBar.style.display = 'flex';
        }
      });

      async function queryCameraText(rawText) {
        const key = document.getElementById('asst-api-input').value.trim()
          || localStorage.getItem('geminiApiKey') || '';

        if (!key) {
          showCameraResult(rawText, null);
          document.getElementById('asst-settings-body').classList.add('open');
          document.getElementById('asst-settings-arrow').classList.add('open');
          return;
        }

        currentWord = rawText.split(/\n|\s/).filter(Boolean)[0]?.substring(0, 40) || '';
        loadingEl.style.display = 'flex';

        const prompt =
          `Это текст с фотографии на венгерском языке: "${rawText}".\n` +
          `Переведи на русский язык. Если есть отдельные слова — дай перевод каждого. ` +
          `Объясни контекст если нужно.`;

        try {
          const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            }
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data     = await res.json();
          const response = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
          showCameraResult(rawText, response);
        } catch (err) {
          showCameraResult(rawText, null, err.message);
        } finally {
          loadingEl.style.display = 'none';
        }
      }

      function showCameraResult(original, translation, errorMsg) {
        lastResult = null;
        resultWord.textContent = '📷 С фото';
        resultBody.innerHTML   = '';

        // Original text row
        const origRow  = document.createElement('div');
        origRow.className = 'asst-result-row';
        origRow.innerHTML =
          `<span class="asst-result-label">Оригинал</span>` +
          `<span class="asst-result-value" style="font-style:italic;color:#999;white-space:pre-wrap">${original}</span>`;
        resultBody.appendChild(origRow);

        if (errorMsg) {
          const errRow = document.createElement('div');
          errRow.className = 'asst-result-row';
          errRow.innerHTML =
            `<span class="asst-result-label">Ошибка</span>` +
            `<span class="asst-result-value" style="color:#c83232">${errorMsg}</span>`;
          resultBody.appendChild(errRow);
          resultActs.style.display = 'none';
        } else if (!translation) {
          const infoRow = document.createElement('div');
          infoRow.className = 'asst-result-row';
          infoRow.innerHTML =
            `<span class="asst-result-value" style="color:#aaa">` +
            `Добавьте Gemini API ключ в настройках ниже</span>`;
          resultBody.appendChild(infoRow);
          resultActs.style.display = 'none';
        } else {
          const transRow = document.createElement('div');
          transRow.className = 'asst-result-row';
          transRow.innerHTML =
            `<span class="asst-result-label">Перевод</span>` +
            `<span class="asst-result-value" style="white-space:pre-wrap">${translation}</span>`;
          resultBody.appendChild(transRow);

          // Store for save
          lastResult = { word: original, translation, transcription: '', example: '' };

          // Hide listen btn (no single word for TTS)
          document.getElementById('asst-listen-result-btn').style.display = 'none';
          saveLbl.textContent = 'СОХРАНИТЬ';
          saveBtn.classList.remove('saved');
          resultActs.style.display = 'flex';
        }

        resultEl.style.display = 'block';
        resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // Restore listen btn on regular queries
      const origQuery = query; // keep reference to restore listen btn
      document.getElementById('asst-send-btn').addEventListener('click', () => {
        document.getElementById('asst-listen-result-btn').style.display = '';
      }, true);
      document.getElementById('asst-mic-btn').addEventListener('click', () => {
        document.getElementById('asst-listen-result-btn').style.display = '';
      }, true);
    })();

    /* ── Dictionary screen ── */
    function pluralWords(n) {
      const mod10 = n % 10, mod100 = n % 100;
      if (mod10 === 1 && mod100 !== 11) return 'слово';
      if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'слова';
      return 'слов';
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    function renderDictionary() {
      const saved   = getSavedVerbs();
      const listEl  = document.getElementById('dict-list');
      const countEl = document.getElementById('dict-count');
      const footer  = document.getElementById('dict-footer');

      countEl.textContent = saved.length
        ? `${saved.length} ${pluralWords(saved.length)}`
        : '';

      listEl.innerHTML = '';

      if (!saved.length) {
        footer.style.display = 'none';
        listEl.innerHTML = `
          <div class="dict-empty">
            <span class="dict-empty-icon">♡</span>
            <p>Сохраняйте слова нажимая&nbsp;♡ в карточках</p>
          </div>`;
        return;
      }

      footer.style.display = 'block';

      saved.forEach((word, idx) => {
        const item = document.createElement('div');
        item.className = 'dict-item';
        item.innerHTML = `
          <div class="dict-item-info">
            <span class="dict-item-hu">${word.direction === 'ru->hu' ? word.ru : word.hu}</span>
            <span class="dict-item-ru">${word.direction === 'ru->hu' ? word.hu : word.ru}</span>
            <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
              ${word.savedAt ? `<span class="dict-item-date">${formatDate(word.savedAt)}</span>` : ''}
              ${word.manual && word.direction === 'ru->hu'
                ? `<span class="dict-dir-badge">🇷🇺 → 🇭🇺</span>`
                : word.manual
                  ? `<span class="dict-dir-badge">🇭🇺 → 🇷🇺</span>`
                  : ''}
            </div>
          </div>
          <div class="dict-item-actions">
            <button class="dict-action-btn dict-listen-btn" data-word="${word.hu}" aria-label="Послушать">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="23" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"/>
                <line x1="8"  y1="23" x2="16" y2="23" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="dict-action-btn dict-delete-btn" data-idx="${idx}" aria-label="Удалить">
              <svg viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>`;
        listEl.appendChild(item);
      });
    }

    document.getElementById('dict-list').addEventListener('click', e => {
      const listenBtn = e.target.closest('.dict-listen-btn');
      const deleteBtn = e.target.closest('.dict-delete-btn');

      if (listenBtn && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(listenBtn.dataset.word);
        utt.lang = 'hu-HU';
        utt.rate = 0.85;
        window.speechSynthesis.speak(utt);
      }

      if (deleteBtn) {
        const saved = getSavedVerbs();
        saved.splice(parseInt(deleteBtn.dataset.idx, 10), 1);
        localStorage.setItem('savedVerbs', JSON.stringify(saved));
        renderDictionary();
      }
    });

    /* ── Add word form ── */
    (function () {
      const overlay   = document.getElementById('dict-form-overlay');
      const field1    = document.getElementById('dict-form-field1');
      const field2    = document.getElementById('dict-form-field2');
      const label1    = document.getElementById('dict-form-label1');
      const label2    = document.getElementById('dict-form-label2');
      const saveBtn   = document.getElementById('dict-form-save');
      const cancelBtn = document.getElementById('dict-form-cancel');
      const btnHu2Ru  = document.getElementById('dict-dir-hu2ru');
      const btnRu2Hu  = document.getElementById('dict-dir-ru2hu');

      // Direction: 'hu->ru' | 'ru->hu'
      let dir = 'hu->ru';

      const config = {
        'hu->ru': {
          label1: 'Венгерское слово',
          placeholder1: 'например: köszönöm',
          label2: 'Перевод на русский',
          placeholder2: 'например: спасибо',
        },
        'ru->hu': {
          label1: 'Русское слово',
          placeholder1: 'например: спасибо',
          label2: 'Перевод на венгерский',
          placeholder2: 'например: köszönöm',
        },
      };

      function applyDirection(d) {
        dir = d;
        const c = config[d];
        label1.textContent       = c.label1;
        field1.placeholder       = c.placeholder1;
        label2.textContent       = c.label2;
        field2.placeholder       = c.placeholder2;
        btnHu2Ru.classList.toggle('active', d === 'hu->ru');
        btnRu2Hu.classList.toggle('active', d === 'ru->hu');
        field1.value = '';
        field2.value = '';
        saveBtn.disabled = true;
        field1.focus();
      }

      btnHu2Ru.addEventListener('click', () => applyDirection('hu->ru'));
      btnRu2Hu.addEventListener('click', () => applyDirection('ru->hu'));

      function openForm() {
        applyDirection('hu->ru');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        setTimeout(() => field1.focus(), 320);
      }

      function closeForm() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      function checkInputs() {
        saveBtn.disabled = !(field1.value.trim() && field2.value.trim());
      }

      document.getElementById('dict-add-btn').addEventListener('click', openForm);
      cancelBtn.addEventListener('click', closeForm);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeForm(); });
      field1.addEventListener('input', checkInputs);
      field2.addEventListener('input', checkInputs);

      field1.addEventListener('keydown', e => {
        if (e.key === 'Enter' && field1.value.trim()) field2.focus();
      });
      field2.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !saveBtn.disabled) saveBtn.click();
      });

      saveBtn.addEventListener('click', () => {
        const v1 = field1.value.trim();
        const v2 = field2.value.trim();
        if (!v1 || !v2) return;

        // Always store hu = Hungarian word, ru = Russian word
        const hu = dir === 'hu->ru' ? v1 : v2;
        const ru = dir === 'hu->ru' ? v2 : v1;

        const saved = getSavedVerbs();
        saved.unshift({
          hu,
          ru,
          transcription: '',
          examples: [],
          savedAt: new Date().toISOString(),
          manual: true,
          direction: dir,
        });
        localStorage.setItem('savedVerbs', JSON.stringify(saved));
        renderDictionary();
        renderHome();
        closeForm();
      });
    })();

    document.getElementById('dict-clear-btn').addEventListener('click', () => {
      if (confirm('Удалить все сохранённые слова?')) {
        localStorage.removeItem('savedVerbs');
        renderDictionary();
      }
    });

    navBtns.forEach(btn => {
      if (btn.dataset.target === 'screen-dictionary') {
        btn.addEventListener('click', renderDictionary);
      }
    });

    renderDictionary();

    /* ── Home screen ── */
    let _wodWord = '';

    function renderHome() {
      const allWords = [...verbs, ...nouns];
      const dayIdx   = Math.floor(Date.now() / 86400000) % allWords.length;
      const wod      = allWords[dayIdx];
      _wodWord = wod.hu;

      document.getElementById('wod-hu').textContent            = wod.hu;
      document.getElementById('wod-transcription').textContent = wod.transcription || '';
      document.getElementById('wod-ru').textContent            = wod.ru;

      // Noun count
      document.getElementById('home-nouns-count').textContent  = `${nouns.length} слов`;

      // Dictionary counter
      const saved  = getSavedVerbs();
      const count  = saved.length;
      const dictSub  = document.getElementById('home-dict-sub');
      const dictInfo = document.getElementById('home-dict-info');
      if (count > 0) {
        dictSub.textContent  = `${count} ${pluralWords(count)}`;
        dictInfo.textContent = `В словаре ${count} ${pluralWords(count)}`;
      } else {
        dictSub.textContent  = 'сохранённые слова';
        dictInfo.textContent = '';
      }
    }

    document.getElementById('wod-listen-btn').addEventListener('click', () => {
      if (!_wodWord || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(_wodWord);
      u.lang = 'hu-HU'; u.rate = 0.85;
      window.speechSynthesis.speak(u);
    });

    // Home quick-access cards → navigate like bottom nav
    document.querySelectorAll('.home-card').forEach(card => {
      card.addEventListener('click', () => {
        const targetId = card.dataset.target;
        screens.forEach(s => s.classList.remove('active'));
        navBtns.forEach(b => b.classList.remove('active'));
        document.getElementById(targetId).classList.add('active');
        navBtns.forEach(b => {
          if (b.dataset.target === targetId) b.classList.add('active');
        });
        if (targetId === 'screen-dictionary') renderDictionary();
      });
    });

    // Refresh home when bottom-nav home tab is tapped
    navBtns.forEach(btn => {
      if (btn.dataset.target === 'screen-home') {
        btn.addEventListener('click', renderHome);
      }
    });

    renderHome();
  </script>
</body>
</html>
